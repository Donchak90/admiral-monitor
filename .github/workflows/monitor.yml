name: Telegram Admiral Monitor

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch: {}

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      PYTHONUNBUFFERED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create service_account.json
        run: |
          echo '${{ secrets.SERVICE_ACCOUNT_JSON }}' > service_account.json

      - name: Quick env check (names only)
        shell: bash
        run: |
          set -euo pipefail
          echo "Has API_ID?           " $([ -n "${API_ID-}" ] && echo YES || echo NO)
          echo "Has API_HASH?         " $([ -n "${API_HASH-}" ] && echo YES || echo NO)
          echo "Has TELETHON_SESSION? " $([ -n "${TELETHON_SESSION-}" ] && echo YES || echo NO)
          echo "Has GSHEET_NAME?      " $([ -n "${GOOGLE_SHEET_NAME-}" ] && echo YES || echo NO)
          echo "Has TZ?               " $([ -n "${TZ-}" ] && echo YES || echo NO)
          python - <<PY
import json, sys
try:
    d=json.load(open("service_account.json"))
    print("Loaded service_account.json OK")
    print("service account email:", d.get("client_email","<missing>"))
except Exception as e:
    print("FAILED to load service_account.json:", e)
    sys.exit(1)
PY

      - name: Run monitor (verbose)
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          TELETHON_SESSION: ${{ secrets.TELETHON_SESSION }}
          GOOGLE_SHEET_NAME: ${{ secrets.GSHEET_NAME }}
          TZ: ${{ secrets.TZ }}
        run: |
          set -euo pipefail
          python -u monitor_telegram_to_sheets.py
